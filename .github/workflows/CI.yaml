name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vulkan loader
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libvulkan-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked --no-fail-fast

      - name: Check loaded feature
        run: cargo check --workspace --all-targets --no-default-features --features loaded --locked

      - name: Docs
        run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Verify generated files are committed
        run: git diff --exit-code

  portable-loaded:
    name: Loaded Feature (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check loaded feature
        run: cargo check --workspace --all-targets --no-default-features --features loaded --locked

  nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Flake check
        run: nix flake check --print-build-logs

  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    needs: [rust, portable-loaded, nix]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version bump
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          current="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          if previous_toml="$(git show "${BEFORE_SHA}:Cargo.toml" 2>/dev/null)"; then
            previous="$(printf '%s' "${previous_toml}" | python3 -c 'import sys, tomllib; data=sys.stdin.buffer.read(); print(tomllib.loads(data.decode())["package"]["version"] if data else "")')"
          else
            previous=""
          fi
          tag="v${current}"

          git fetch --tags --quiet
          if [ "${current}" != "${previous}" ] && ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            changed=true
          else
            changed=false
          fi

          echo "version=${current}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

  release-build:
    name: Release Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: release-metadata
    if: needs.release-metadata.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            rust_targets: x86_64-unknown-linux-gnu
            asset_target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            exe_suffix: ""
          - name: Windows x86_64
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            asset_target: x86_64-pc-windows-msvc
            archive_ext: zip
            exe_suffix: .exe
          - name: macOS universal
            os: macos-latest
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            asset_target: universal-apple-darwin
            archive_ext: tar.gz
            exe_suffix: ""
    env:
      BIN_NAME: vkfetch-rs
      ASSET_NAME: vkfetch-rs-${{ needs.release-metadata.outputs.tag }}-${{ matrix.asset_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        if: matrix.asset_target != 'universal-apple-darwin'
        run: cargo build --release --no-default-features --features loaded --locked --target ${{ matrix.rust_targets }}

      - name: Build universal macOS release binary
        if: matrix.asset_target == 'universal-apple-darwin'
        shell: bash
        run: |
          cargo build --release --no-default-features --features loaded --locked --target x86_64-apple-darwin
          cargo build --release --no-default-features --features loaded --locked --target aarch64-apple-darwin
          mkdir -p "target/${{ matrix.asset_target }}/release"
          lipo -create \
            "target/x86_64-apple-darwin/release/${BIN_NAME}" \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            -output "target/${{ matrix.asset_target }}/release/${BIN_NAME}"
          lipo -info "target/${{ matrix.asset_target }}/release/${BIN_NAME}"

      - name: Stage executable
        shell: bash
        run: |
          mkdir -p "dist/${ASSET_NAME}"
          cp "target/${{ matrix.asset_target }}/release/${BIN_NAME}${{ matrix.exe_suffix }}" "dist/${ASSET_NAME}/"
          cp README.md "dist/${ASSET_NAME}/"

      - name: Package executable
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: tar -C dist -czf "${ASSET_NAME}.tar.gz" "${ASSET_NAME}"

      - name: Package executable
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "dist/${env:ASSET_NAME}" -DestinationPath "${env:ASSET_NAME}.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release-metadata, release-build]
    if: needs.release-metadata.outputs.changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vkfetch-rs-${{ needs.release-metadata.outputs.tag }}-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: vkfetch-rs ${{ needs.release-metadata.outputs.tag }}
          generate_release_notes: true
          files: dist/*
